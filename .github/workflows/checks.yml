name: checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap, fast feedback: everything that isn't a VM test (formatting, eval checks, package builds).
  fast:
    name: eval + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Non-VM checks
        run: |
          all=$(nix eval --json .#checks.x86_64-linux --apply builtins.attrNames | jq -r '.[]')
          for c in $(echo "$all" | grep -v '^vm-' || true); do
            echo "::group::$c"
            nix build -L --no-link ".#checks.x86_64-linux.$c"
            echo "::endgroup::"
          done

  # NixOS VM integration tests: slower, need KVM. Auto-discovered by the `vm-` prefix, so new tests
  # are picked up without touching this file.
  vm:
    name: nixos vm tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            system-features = nixos-test benchmark big-parallel kvm
      - name: VM checks
        run: |
          all=$(nix eval --json .#checks.x86_64-linux --apply builtins.attrNames | jq -r '.[]')
          for c in $(echo "$all" | grep '^vm-' || true); do
            echo "::group::$c"
            nix build -L --no-link ".#checks.x86_64-linux.$c"
            echo "::endgroup::"
          done
